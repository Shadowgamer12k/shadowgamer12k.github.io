<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Salma ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #ffe4e1; /* Misty Rose */
            background-image: 
                radial-gradient(#ffb7b2 15%, transparent 16%),
                radial-gradient(#ffb7b2 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .pixel-card {
            box-shadow: 
                8px 0 #000,
                -8px 0 #000,
                0 -8px #000,
                0 8px #000,
                0 0 0 8px #000;
            background: white;
        }

        .btn-pixel {
            box-shadow: inset -4px -4px 0px 0px rgba(0,0,0,0.2);
            transition: all 0.1s;
        }
        .btn-pixel:active {
            transform: translateY(2px);
            box-shadow: inset -2px -2px 0px 0px rgba(0,0,0,0.2);
        }

        /* Pixel Icon Utility */
        .pixel-icon {
            display: inline-block;
            vertical-align: middle;
            shape-rendering: crispEdges; /* Important for pixel look */
        }

        /* Animations */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes sway {
            0% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
            100% { transform: rotate(-5deg); }
        }

        .animate-shake { animation: shake 0.5s; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-sway { animation: sway 2s ease-in-out infinite; }
        
        .rogue-absolute {
            position: fixed;
            z-index: 50;
            transition: top 0.3s ease, left 0.3s ease, transform 0.3s ease;
        }

        .scanlines {
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            position: fixed;
            pointer-events: none;
            top: 0; right: 0; bottom: 0; left: 0;
            z-index: 999;
        }
        
        .hidden { display: none !important; }

        textarea {
            resize: none;
            outline: none;
            font-family: 'Press Start 2P', cursive;
            line-height: 1.5;
        }
        
        textarea::placeholder {
            color: #9ca3af;
            font-size: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <audio id="bg-music" loop>
        <source src="https://ia801504.us.archive.org/27/items/Rolemusic_-_pl4y1ng/Rolemusic_-_pl4y1ng.mp3" type="audio/mp3">

        <!-- Header Image -->

            Salma, will you be my Valentine? 
            <!-- Pixel Heart Inline -->

                <path d="M2 2h2v2h-2z M6 2h2v2h-2z M1 3h1v2h-1z M8 3h1v2h-1z M1 5h2v1h-2z M7 5h2v1h-2z M2 6h6v1h-6z M3 7h4v1h-4z M4 8h2v1h-2z" fill="currentColor"/>

        <!-- Interaction Area -->
        <div class="relative h-32 flex flex-col items-center justify-center gap-4">

                <!-- YES BUTTON -->

                    YES 
                    <svg class="pixel-icon" width="14" height="14" viewBox="0 0 10 10"><path d="M2 2h2v2h-2z M6 2h2v2h-2z M1 3h1v2h-1z M8 3h1v2h-1z M1 5h2v1h-2z M7 5h2v1h-2z M2 6h6v1h-6z M3 7h4v1h-4z M4 8h2v1h-2z" fill="white"/></svg>

                <!-- NO BUTTON -->
                <button id="no-btn" class="btn-pixel bg-red-500 hover:bg-red-400 text-white py-4 px-8 border-4 border-black text-sm md:text-base cursor-pointer flex items-center gap-2">
                    NO 
                    <svg class="pixel-icon" width="14" height="14" viewBox="0 0 10 10"><path d="M2 2h2v1h-2z M6 2h2v2h-2z M1 3h1v2h-1z M8 3h1v2h-1z M2 6h2v1h-2z M5 5h1v1h-1z M6 6h2v1h-2z M3 7h1v1h-1z M5 7h1v1h-1z M4 8h2v1h-2z" fill="white"/><path d="M5 2v3h-1v2h2v1" fill="rgba(0,0,0,0.2)"/></svg>
                </button>
            
            </div>
            
            <p id="feedback-text" class="text-xs text-red-600 mt-4 h-6 font-bold"></p>
        </div>

    </div>

    <!-- Success Container -->
    <div id="success-container" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-pink-200 overflow-y-auto p-4">
        
        <div class="text-center p-6 border-8 border-white bg-pink-500 text-white pixel-card animate-float w-full max-w-md relative z-10">
            <h1 class="text-2xl md:text-3xl mb-4 flex items-center justify-center gap-2">
                YAYYY! 
                <!-- Pixel Confetti -->
                <svg class="pixel-icon" width="30" height="30" viewBox="0 0 10 10">
                    <path d="M4 8l2 2l-2-2z" fill="yellow"/>
                    <rect x="2" y="2" width="1" height="1" fill="#fff" />
                    <rect x="8" y="3" width="1" height="1" fill="#fff" />
                    <rect x="5" y="1" width="1" height="1" fill="#fff" />

                </svg>
            </h1>
            <p class="text-sm md:text-base mb-6 flex items-center justify-center gap-2 flex-wrap">
                I knew you couldn't refuse, Salma! 
                <svg class="pixel-icon text-red-200" width="16" height="16" viewBox="0 0 10 10">
                    <path d="M2 2h2v2h-2z M6 2h2v2h-2z M1 3h1v2h-1z M8 3h1v2h-1z M1 5h2v1h-2z M7 5h2v1h-2z M2 6h6v1h-6z M3 7h4v1h-4z M4 8h2v1h-2z" fill="currentColor"/>

            <!-- Large decorative pixel art for success -->
            <div class="flex justify-center gap-4 mb-6">
                <!-- Cat Face -->
                <svg width="60" height="50" viewBox="0 0 120 100">
                    <rect x="20" y="30" width="80" height="60" fill="white" stroke="black" stroke-width="4"/>
                    <polygon points="20,30 30,10 50,30" fill="white" stroke="black" stroke-width="4"/>

                    <ellipse cx="60" cy="65" rx="6" ry="4" fill="#ffcc00" stroke="black" stroke-width="2"/>

            <!-- Memory Input Section -->

                    class="w-full h-24 p-3 text-black text-xs md:text-sm border-4 border-black focus:outline-none focus:border-pink-300 placeholder-gray-500" 
                    placeholder="Remember that time when we..."></textarea>
                
                <button onclick="downloadCard()" class="w-full mt-4 btn-pixel bg-blue-500 hover:bg-blue-400 text-white border-4 border-black py-3 text-xs md:text-sm uppercase font-bold tracking-wide flex items-center justify-center gap-2">
                    <!-- Floppy Disk Icon -->
                    <svg class="pixel-icon" width="16" height="16" viewBox="0 0 10 10">
                        <path d="M1 1h8v8h-8z" fill="white"/>
                        <rect x="2" y="1" width="6" height="3" fill="#3b82f6"/>
                        <rect x="3" y="1" width="2" height="2" fill="white"/>
                        <rect x="2" y="6" width="6" height="3" fill="#e5e7eb"/>
                    </svg>
                    Save & Download
                </button>
            </div>

            <button onclick="location.reload()" class="mt-6 text-xs underline opacity-80 hover:opacity-100">
                Play Again?
            </button>
        </div>

        <canvas id="confetti-canvas" class="absolute inset-0 pointer-events-none z-0"></canvas>
    </div>

    <script>
        // State
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const feedback = document.getElementById('feedback-text');
        const catIcon = document.getElementById('cat-icon');
        const musicBtn = document.getElementById('music-btn');
        const musicIcon = document.getElementById('music-icon');
        const audio = document.getElementById('bg-music');
        
        // Reusable SVG strings
        const heartSvg = `<svg class="pixel-icon" width="14" height="14" viewBox="0 0 10 10"><path d="M2 2h2v2h-2z M6 2h2v2h-2z M1 3h1v2h-1z M8 3h1v2h-1z M1 5h2v1h-2z M7 5h2v1h-2z M2 6h6v1h-6z M3 7h4v1h-4z M4 8h2v1h-2z" fill="white"/></svg>`;
        const brokenHeartSvg = `<svg class="pixel-icon" width="14" height="14" viewBox="0 0 10 10"><path d="M2 2h2v1h-2z M6 2h2v2h-2z M1 3h1v2h-1z M8 3h1v2h-1z M2 6h2v1h-2z M5 5h1v1h-1z M6 6h2v1h-2z M3 7h1v1h-1z M5 7h1v1h-1z M4 8h2v1h-2z" fill="white"/><path d="M5 2v3h-1v2h2v1" fill="rgba(0,0,0,0.2)"/></svg>`;
        const noteSvg = `<svg class="pixel-icon" width="16" height="16" viewBox="0 0 10 10"><path d="M2 8h2v-5h3v1h-2v4h2v-6h-5z" fill="#ec4899"/></svg>`;
        const muteSvg = `<svg class="pixel-icon" width="16" height="16" viewBox="0 0 10 10"><path d="M1 3h2l3-3v10l-3-3h-2z" fill="#ec4899"/><path d="M8 3l2 4m-2 0l2-4" stroke="#ec4899" stroke-width="1"/></svg>`;

        let noCount = 0;
        let yesScale = 1;
        let musicPlaying = false;

        function toggleMusic() {
            if (musicPlaying) {
                audio.pause();
                musicBtn.childNodes[0].nodeValue = "Music: ";
                musicIcon.innerHTML = muteSvg;
            } else {
                audio.play().then(() => {
                    musicBtn.childNodes[0].nodeValue = "Music: ";
                    musicIcon.innerHTML = noteSvg;
                }).catch(e => console.log("Audio autoplay blocked"));
            }
            musicPlaying = !musicPlaying;
        }

        musicBtn.addEventListener('click', toggleMusic);

        function tryStartMusic() {
            if (!musicPlaying) {
                audio.volume = 0.5;
                audio.play().then(() => {
                    musicPlaying = true;
                    musicBtn.childNodes[0].nodeValue = "Music: ";
                    musicIcon.innerHTML = noteSvg;
                }).catch(() => {});
            }
            document.removeEventListener('click', tryStartMusic);
        }
        document.addEventListener('click', tryStartMusic);


        // 20 Possibilities - Updated with innerHTML for Icons
        const events = [
            () => { setText("Are you sure?"); },
            () => { setText("Really sure?"); scaleNo(0.9); },
            () => { setText("Salma please..."); moveButton(50, 0); },
            () => { setText("Look at the other button!"); growYes(); },
            () => { 
                // Swap text and icons
                noBtn.innerHTML = "Yes " + heartSvg; 
                yesBtn.innerHTML = "NO (jk) " + brokenHeartSvg; 
                setTimeout(() => {
                   noBtn.innerHTML = "NO " + brokenHeartSvg;
                   yesBtn.innerHTML = "YES " + heartSvg;
                }, 1000);
            },
            () => { setText("Catch me if you can!"); makeAbsolute(); teleportRandom(); },
            () => { setText("Don't break my heart!"); noBtn.classList.add('animate-shake'); setTimeout(() => noBtn.classList.remove('animate-shake'), 500); },
            () => { setText("Click the GREEN one!"); growYes(1.5); },
            () => { setText("Missed!"); teleportRandom(); },
            () => { setText("You're making me dizzy!"); noBtn.style.transform = `rotate(${Math.random() * 360}deg)`; },
            () => { setText("I'm fading away..."); noBtn.style.opacity = "0.5"; teleportRandom(); },
            () => { alert("Error: 'No' is not a valid option for Salma."); },
            () => { noBtn.style.opacity = "1"; noBtn.style.transform = "rotate(0deg)"; setText("Don't do this ;("); growYes(1.2); },
            () => { setText("I'm fast now!"); noBtn.onmouseover = teleportRandom; },
            () => { noBtn.onmouseover = null; noBtn.innerHTML = "YES " + heartSvg; noBtn.style.backgroundColor = "#22c55e"; setText("Resistance is futile."); },
            () => { setText("Bye bye!"); noBtn.style.transition = "top 1s ease-in"; noBtn.style.top = "150%"; setTimeout(() => { noBtn.style.transition = "none"; teleportRandom(); noBtn.innerHTML = "NO " + brokenHeartSvg; noBtn.style.backgroundColor = "#ef4444"; }, 1200); },
            () => { setText("JUST CLICK YES!"); growYes(2.0); },
            () => { setText("The button exploded due to sadness."); noBtn.classList.add('hidden'); setTimeout(() => { noBtn.classList.remove('hidden'); setText("I pulled it back together."); teleportRandom(); }, 2000); },
            () => { const eyes = document.querySelectorAll('rect[fill="black"]'); eyes.forEach(e => e.setAttribute('height', '2')); setText("Salma, look at the cat crying!"); },
            () => { setText("Okay, I removed the button."); noBtn.style.display = 'none'; yesBtn.style.transform = 'scale(1)'; yesBtn.style.width = '100%'; yesBtn.style.height = '100px'; yesBtn.style.fontSize = '2rem'; yesBtn.innerHTML = "YES " + heartSvg; }
        ];

        function handleInteraction(e) {
            tryStartMusic();
            if (noCount < events.length) {
                events[noCount]();
            } else {
                teleportRandom();
                growYes(1.1);
            }
            noCount++;
        }

        function setText(msg) {
            feedback.innerText = msg;
            feedback.classList.remove('animate-bounce');
            void feedback.offsetWidth; 
            feedback.classList.add('animate-bounce');
        }

        function growYes(multiplier = 1.3) {
            yesScale *= multiplier;
            yesBtn.style.transform = `scale(${yesScale})`;
            if(yesScale > 2) yesBtn.style.zIndex = 100;
        }

        function scaleNo(val) { noBtn.style.transform = `scale(${val})`; }
        function moveButton(x, y) { noBtn.style.transform = `translate(${x}px, ${y}px)`; }
        function makeAbsolute() {
            if (noBtn.style.position !== 'fixed') {
                noBtn.style.position = 'fixed';
                const rect = noBtn.getBoundingClientRect();
                noBtn.style.left = rect.left + 'px';
                noBtn.style.top = rect.top + 'px';
            }
        }
        function teleportRandom() {
            makeAbsolute();
            const w = window.innerWidth - 100;
            const h = window.innerHeight - 50;
            const randomX = Math.max(20, Math.random() * w);
            const randomY = Math.max(20, Math.random() * h);
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('click', handleInteraction);
        yesBtn.addEventListener('click', () => {
            document.getElementById('success-container').classList.remove('hidden');
            startConfetti();
        });

        // --- Card Generation Logic (Replaced Emoji Text with Drawn Pixels) ---
        function downloadCard() {
            const memoryText = document.getElementById('memory-input').value.trim() || "Forever & Always";
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const width = 600;
            const height = 400;
            
            canvas.width = width;
            canvas.height = height;

            // Background
            ctx.fillStyle = "#ffe4e1";
            ctx.fillRect(0, 0, width, height);
            
            // Pattern
            ctx.fillStyle = "#ffb7b2";
            for(let i=0; i<width; i+=20) {
                for(let j=0; j<height; j+=20) {
                    if((i+j)%40 === 0) ctx.fillRect(i, j, 4, 4);
                }
            }

            // Border
            ctx.lineWidth = 8;
            ctx.strokeStyle = "black";
            ctx.strokeRect(10, 10, width - 20, height - 20);

            // Red Pixel Corners
            ctx.fillStyle = "#ef4444"; 
            const cornerSize = 25;
            ctx.fillRect(10, 10, cornerSize, cornerSize);
            ctx.fillRect(width - 10 - cornerSize, 10, cornerSize, cornerSize);
            ctx.fillRect(10, height - 10 - cornerSize, cornerSize, cornerSize);
            ctx.fillRect(width - 10 - cornerSize, height - 10 - cornerSize, cornerSize, cornerSize);

            // Text
            ctx.textAlign = "center";
            ctx.fillStyle = "#000";
            
            ctx.font = '24px "Press Start 2P", cursive';
            ctx.fillStyle = "#db2777"; 
            ctx.fillText("VALENTINE CERTIFICATE", width/2, 60);

            ctx.font = '32px "Press Start 2P", cursive';
            ctx.fillStyle = "#000";
            ctx.fillText("Jamal & Salma", width/2, 120);

            // Draw a big Pixel Heart on Canvas instead of emojis
            function drawPixelHeart(cx, cy, scale) {
                ctx.fillStyle = "#ef4444";
                const p = scale; // pixel size
                // Simple heart map
                const map = [
                    "01100110",
                    "11111111",
                    "11111111",
                    "11111111",
                    "01111110",
                    "00111100",
                    "00011000"
                ];
                for(let r=0; r<map.length; r++) {
                    for(let c=0; c<map[r].length; c++) {
                        if(map[r][c] === '1') {
                            ctx.fillRect(cx + (c - 4) * p, cy + (r - 3) * p, p, p);
                        }
                    }
                }
            }
            drawPixelHeart(width/2, 160, 6);

            // The Memory
            ctx.font = '16px "Press Start 2P", cursive'; 
            ctx.fillStyle = "#374151"; 
            
            const maxLineWidth = 500;
            const lineHeight = 30;
            let x = width / 2;
            let y = 220;
            
            const words = memoryText.split(' ');
            let line = '';

            for(let n = 0; n < words.length; n++) {
                const testLine = line + words[n] + ' ';
                const metrics = ctx.measureText(testLine);
                const testWidth = metrics.width;
                if (testWidth > maxLineWidth && n > 0) {
                    ctx.fillText(line, x, y);
                    line = words[n] + ' ';
                    y += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, x, y);

            // Date Stamp
            ctx.font = '12px "Press Start 2P"';
            ctx.fillStyle = "#9ca3af";
            ctx.fillText("Official Love Contract • 2026", width/2, height - 30);

            const link = document.createElement('a');
            link.download = `Valentine_Jamal_and_Salma.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        // Confetti
        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];

            function createParticle() {
                return {
                    x: Math.random() * canvas.width,
                    y: -20,
                    size: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speedY: Math.random() * 3 + 2,
                    speedX: Math.random() * 2 - 1
                };
            }

            for (let i = 0; i < 100; i++) particles.push(createParticle());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, index) => {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                    if (p.y > canvas.height) particles[index] = createParticle();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

    </script>
