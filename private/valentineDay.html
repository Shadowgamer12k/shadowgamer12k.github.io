<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Salma ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #ffe4e1; /* Misty Rose */
            background-image: 
                radial-gradient(#ffb7b2 15%, transparent 16%),
                radial-gradient(#ffb7b2 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            overflow-x: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        .pixel-card {
            box-shadow: 
                8px 0 #000,
                -8px 0 #000,
                0 -8px #000,
                0 8px #000,
                0 0 0 8px #000;
            background: white;
        }

        .btn-pixel {
            box-shadow: inset -4px -4px 0px 0px rgba(0,0,0,0.2);
            transition: all 0.1s;
        }
        .btn-pixel:active {
            transform: translateY(2px);
            box-shadow: inset -2px -2px 0px 0px rgba(0,0,0,0.2);
        }

        .pixel-icon {
            display: inline-block;
            vertical-align: middle;
            shape-rendering: crispEdges;
        }

        /* Speech Bubble for the Cat */
        .speech-bubble {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 4px solid #000;
            padding: 10px;
            width: 200px;
            font-size: 10px;
            line-height: 1.4;
            color: #000;
            z-index: 20;
            display: none; /* Hidden by default */
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #000 transparent;
            display: block;
            width: 0;
        }

        /* Background Floating Hearts */
        .floating-heart {
            position: fixed;
            color: #ff69b4;
            font-size: 20px;
            animation: floatUp 6s linear infinite;
            z-index: 1;
            opacity: 0.6;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Animations */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes sway {
            0% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
            100% { transform: rotate(-5deg); }
        }

        .animate-shake { animation: shake 0.5s; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-sway { animation: sway 2s ease-in-out infinite; }
        
        .rogue-absolute {
            position: fixed;
            z-index: 50;
            transition: top 0.3s ease, left 0.3s ease, transform 0.3s ease;
        }

        .scanlines {
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            position: fixed;
            pointer-events: none;
            top: 0; right: 0; bottom: 0; left: 0;
            z-index: 999;
        }
        
        .hidden { display: none !important; }

        textarea {
            resize: none;
            outline: none;
            font-family: 'Press Start 2P', cursive;
            line-height: 1.5;
        }
        textarea::placeholder {
            color: #9ca3af;
            font-size: 10px;
        }

        /* Checkbox styling */
        .pixel-checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 4px solid #000;
            background: #fff;
            cursor: pointer;
            position: relative;
        }
        .pixel-checkbox:checked {
            background: #22c55e;
        }
        .pixel-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: -4px;
            left: 1px;
            color: white;
            font-size: 12px;
        }

        /* Cursor */
        .cursor-pointer { cursor: pointer; }
    </style>
</head>

    <!-- Success Container -->
    <div id="success-container" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-pink-200 overflow-y-auto p-4">
        
        <div class="text-center p-6 border-8 border-white bg-pink-500 text-white pixel-card animate-float w-full max-w-md relative z-10 my-8">
            <h1 class="text-2xl md:text-3xl mb-4 flex items-center justify-center gap-2">
                YAYYY! 
                <svg class="pixel-icon" width="30" height="30" viewBox="0 0 10 10"><path d="M4 8l2 2l-2-2z" fill="yellow"/><rect x="2" y="2" width="1" height="1" fill="#fff" /><rect x="8" y="3" width="1" height="1" fill="#fff" /><rect x="5" y="1" width="1" height="1" fill="#fff" /><path d="M4 5l2 5l2-5z" fill="white"/></svg>
            </h1>
            <p class="text-sm md:text-base mb-6">I knew you couldn't refuse! ❤️</p>
            
            <!-- Big Pixel Art -->

                <svg width="60" height="50" viewBox="0 0 120 100"><rect x="20" y="30" width="80" height="60" fill="white" stroke="black" stroke-width="4"/><polygon points="20,30 30,10 50,30" fill="white" stroke="black" stroke-width="4"/><polygon points="70,30 90,10 100,30" fill="white" stroke="black" stroke-width="4"/><path d="M80 30 L90 20 L100 30 L90 40 Z" fill="#ff0000" stroke="black" stroke-width="2"/><path d="M35 55 h10 v10 h-10 z" fill="#ef4444"/><path d="M75 55 h10 v10 h-10 z" fill="#ef4444"/><ellipse cx="60" cy="65" rx="6" ry="4" fill="#ffcc00" stroke="black" stroke-width="2"/><line x1="10" y1="55" x2="30" y2="58" stroke="black" stroke-width="3"/><line x1="90" y1="58" x2="110" y2="55" stroke="black" stroke-width="3"/></svg>
                <svg width="40" height="50" viewBox="0 0 10 12"><rect x="4" y="6" width="2" height="6" fill="#166534"/><rect x="2" y="8" width="2" height="2" fill="#22c55e"/><rect x="3" y="1" width="4" height="4" fill="#ef4444"/><rect x="4" y="2" width="2" height="2" fill="#991b1b"/></svg>
            </div>
            
            <!-- Date Planner (New Content) -->
            <div class="bg-white/20 p-4 rounded-lg border-2 border-white/50 backdrop-blur-sm text-left mb-4">
                <p class="text-xs mb-3 font-bold uppercase text-center tracking-wider text-white drop-shadow-md">Choose our Date:</p>
                <div class="space-y-2 text-xs md:text-sm">

                        <input type="checkbox" class="pixel-checkbox" value="Movie Night 🍿"> <span>Movie Night 🍿</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer hover:bg-white/10 p-1 rounded">
                        <input type="checkbox" class="pixel-checkbox" value="Dinner Date 🍝"> <span>Dinner Date 🍝</span>

            <!-- Memory Input -->

                    class="w-full h-20 p-3 text-black text-xs md:text-sm border-4 border-black focus:outline-none focus:border-pink-300 placeholder-gray-500" 
                    placeholder="Remember that time when we..."></textarea>
                
                <button onclick="downloadCard()" class="w-full mt-4 btn-pixel bg-blue-500 hover:bg-blue-400 text-white border-4 border-black py-3 text-xs md:text-sm uppercase font-bold tracking-wide flex items-center justify-center gap-2">

                Play Again?

        <canvas id="confetti-canvas" class="absolute inset-0 pointer-events-none z-0"></canvas>
    </div>

    <script>
        // --- Feature 2: Audio Synthesizer (Retro SFX) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'hover') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'click') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'success') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.2);
                osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.6);
            }
        }

        // --- Feature 1: Background Floating Hearts ---
        function createParticles() {
            const container = document.getElementById('particle-container');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('floating-heart');
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 7000);
            }, 800);
        }
        createParticles();

        // --- Feature 4: Typewriter Effect ---
        const questionText = "Salma, will you be my Valentine?";
        const questionEl = document.getElementById('main-question');
        let charIndex = 0;

        function typeWriter() {
            if (charIndex < questionText.length) {
                questionEl.innerHTML += questionText.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 100); // typing speed
            } else {
                // Add heart icon at end
                questionEl.innerHTML += ` <svg class="pixel-icon text-red-500 animate-bounce ml-2" width="24" height="24" viewBox="0 0 10 10"><path d="M2 2h2v2h-2z M6 2h2v2h-2z M1 3h1v2h-1z M8 3h1v2h-1z M1 5h2v1h-2z M7 5h2v1h-2z M2 6h6v1h-6z M3 7h4v1h-4z M4 8h2v1h-2z" fill="currentColor"/></svg>`;
            }
        }
        // Start typing after a short delay
        setTimeout(typeWriter, 500);

        // --- Main Logic ---
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const feedback = document.getElementById('feedback-text');
        const catIcon = document.getElementById('cat-icon');
        const catSpeech = document.getElementById('cat-speech');
        const musicBtn = document.getElementById('music-btn');
        const audio = document.getElementById('bg-music');
        
        // Cat Reasons (Feature 3)
        const catReasons = [
            "Your smile is pixel perfect!",
            "You're my Player 2!",
            "Because you're beautiful!",
            "You make my heart go 8-bit!",
            "Don't make the kitty sad!",
            "I'll give you cookies!",
            "We are meant to be!",
            "Just say Yes already! Meow!",
            "Level up our love!",
            "Game Over if you say No!"
        ];

        // SVGs
        const heartSvg = `<svg class="pixel-icon" width="14" height="14" viewBox="0 0 10 10"><path d="M2 2h2v2h-2z M6 2h2v2h-2z M1 3h1v2h-1z M8 3h1v2h-1z M1 5h2v1h-2z M7 5h2v1h-2z M2 6h6v1h-6z M3 7h4v1h-4z M4 8h2v1h-2z" fill="white"/></svg>`;
        const brokenHeartSvg = `<svg class="pixel-icon" width="14" height="14" viewBox="0 0 10 10"><path d="M2 2h2v1h-2z M6 2h2v2h-2z M1 3h1v2h-1z M8 3h1v2h-1z M2 6h2v1h-2z M5 5h1v1h-1z M6 6h2v1h-2z M3 7h1v1h-1z M5 7h1v1h-1z M4 8h2v1h-2z" fill="white"/><path d="M5 2v3h-1v2h2v1" fill="rgba(0,0,0,0.2)"/></svg>`;

        let noCount = 0;
        let yesScale = 1;
        let musicPlaying = false;

        // Music Toggle
        musicBtn.addEventListener('click', () => {
            if (musicPlaying) {
                audio.pause();
                musicBtn.childNodes[0].nodeValue = "Music: ";
                document.getElementById('music-icon').innerHTML = `<svg class="pixel-icon" width="16" height="16" viewBox="0 0 10 10"><path d="M1 3h2l3-3v10l-3-3h-2z" fill="#ec4899"/><path d="M8 3l2 4m-2 0l2-4" stroke="#ec4899" stroke-width="1"/></svg>`;
            } else {
                audio.play();
                musicBtn.childNodes[0].nodeValue = "Music: ";
                document.getElementById('music-icon').innerHTML = `<svg class="pixel-icon" width="16" height="16" viewBox="0 0 10 10"><path d="M2 8h2v-5h3v1h-2v4h2v-6h-5z" fill="#ec4899"/></svg>`;
            }
            musicPlaying = !musicPlaying;
        });

        // Cat Interaction
        catIcon.addEventListener('click', () => {
            playSound('click');
            // Blink Eyes
            document.getElementById('eye-l').setAttribute('height', '2');
            document.getElementById('eye-r').setAttribute('height', '2');
            
            // Show Heart Bubble
            catSpeech.style.display = 'block';
            catSpeech.innerHTML = "Meow! ❤️";
            
            setTimeout(() => {
                document.getElementById('eye-l').setAttribute('height', '12');
                document.getElementById('eye-r').setAttribute('height', '12');
                catSpeech.style.display = 'none';
            }, 1000);
        });

        // Button Interactions
        function handleInteraction(e) {
            playSound('hover'); // Play SFX
            
            // Show Random Reason
            catSpeech.style.display = 'block';
            catSpeech.innerText = catReasons[Math.floor(Math.random() * catReasons.length)];
            
            // Events Logic
            if (noCount < events.length) events[noCount]();
            else {
                teleportRandom();
                growYes(1.1);
            }
            noCount++;
        }

        const events = [
            () => { setText("Are you sure?"); },
            () => { setText("Really sure?"); scaleNo(0.9); },
            () => { setText("Salma please..."); moveButton(50, 0); },
            () => { setText("Look at the other button!"); growYes(); },
            () => { 
                noBtn.innerHTML = "Yes " + heartSvg; 
                yesBtn.innerHTML = "NO (jk) " + brokenHeartSvg; 
                setTimeout(() => {
                   noBtn.innerHTML = "NO " + brokenHeartSvg;
                   yesBtn.innerHTML = "YES " + heartSvg;
                }, 1000);
            },
            () => { setText("Catch me if you can!"); makeAbsolute(); teleportRandom(); },
            () => { setText("Don't break my heart!"); noBtn.classList.add('animate-shake'); setTimeout(() => noBtn.classList.remove('animate-shake'), 500); },
            () => { setText("Click the GREEN one!"); growYes(1.5); },
            () => { setText("Missed!"); teleportRandom(); },
            () => { setText("You're making me dizzy!"); noBtn.style.transform = `rotate(${Math.random() * 360}deg)`; },
            () => { setText("I'm fading away..."); noBtn.style.opacity = "0.5"; teleportRandom(); },
            () => { alert("Error: 'No' is not a valid option for Salma."); },
            () => { noBtn.style.opacity = "1"; noBtn.style.transform = "rotate(0deg)"; setText("Don't do this ;("); growYes(1.2); },
            () => { setText("I'm fast now!"); noBtn.onmouseover = teleportRandom; },
            () => { noBtn.onmouseover = null; noBtn.innerHTML = "YES " + heartSvg; noBtn.style.backgroundColor = "#22c55e"; setText("Resistance is futile."); },
            () => { setText("Bye bye!"); noBtn.style.transition = "top 1s ease-in"; noBtn.style.top = "150%"; setTimeout(() => { noBtn.style.transition = "none"; teleportRandom(); noBtn.innerHTML = "NO " + brokenHeartSvg; noBtn.style.backgroundColor = "#ef4444"; }, 1200); },
            () => { setText("JUST CLICK YES!"); growYes(2.0); },
            () => { setText("The button exploded due to sadness."); noBtn.classList.add('hidden'); setTimeout(() => { noBtn.classList.remove('hidden'); setText("I pulled it back together."); teleportRandom(); }, 2000); },
            () => { const eyes = document.querySelectorAll('#cat-eyes rect'); eyes.forEach(e => e.setAttribute('height', '2')); setText("Salma, look at the cat crying!"); },
            () => { setText("Okay, I removed the button."); noBtn.style.display = 'none'; yesBtn.style.transform = 'scale(1)'; yesBtn.style.width = '100%'; yesBtn.style.height = '100px'; yesBtn.style.fontSize = '2rem'; yesBtn.innerHTML = "YES " + heartSvg; }
        ];

        function setText(msg) {
            feedback.innerText = msg;
            feedback.classList.remove('animate-bounce');
            void feedback.offsetWidth; 
            feedback.classList.add('animate-bounce');
        }

        function growYes(multiplier = 1.3) {
            yesScale *= multiplier;
            yesBtn.style.transform = `scale(${yesScale})`;
            if(yesScale > 2) yesBtn.style.zIndex = 100;
        }

        function scaleNo(val) { noBtn.style.transform = `scale(${val})`; }
        function moveButton(x, y) { noBtn.style.transform = `translate(${x}px, ${y}px)`; }
        function makeAbsolute() {
            if (noBtn.style.position !== 'fixed') {
                noBtn.style.position = 'fixed';
                const rect = noBtn.getBoundingClientRect();
                noBtn.style.left = rect.left + 'px';
                noBtn.style.top = rect.top + 'px';
            }
        }
        function teleportRandom() {
            makeAbsolute();
            const w = window.innerWidth - 100;
            const h = window.innerHeight - 50;
            noBtn.style.left = Math.max(20, Math.random() * w) + 'px';
            noBtn.style.top = Math.max(20, Math.random() * h) + 'px';
        }

        // Event Listeners
        noBtn.addEventListener('click', handleInteraction);
        yesBtn.addEventListener('click', () => {
            playSound('success');
            document.getElementById('success-container').classList.remove('hidden');
            startConfetti();
            // Try to start music if not started
            if (!musicPlaying) {
                audio.play().catch(()=>{}); 
                musicPlaying = true;
            }
        });

        // Add sounds to buttons
        yesBtn.addEventListener('mouseenter', () => playSound('hover'));
        noBtn.addEventListener('mouseenter', () => playSound('hover'));


        // --- Download Card (Feature 5: Date Stamping) ---
        function downloadCard() {
            const memoryText = document.getElementById('memory-input').value.trim() || "Forever & Always";
            
            // Get selected dates
            const checkboxes = document.querySelectorAll('.pixel-checkbox:checked');
            let selectedDates = [];
            checkboxes.forEach((cb) => selectedDates.push(cb.value));
            const dateText = selectedDates.length > 0 ? "Date Plan: " + selectedDates.join(", ") : "Date Plan: Surprise Me!";

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const width = 600;
            const height = 500; // Taller for date info
            
            canvas.width = width;
            canvas.height = height;

            // Background
            ctx.fillStyle = "#ffe4e1";
            ctx.fillRect(0, 0, width, height);
            
            // Pattern
            ctx.fillStyle = "#ffb7b2";
            for(let i=0; i<width; i+=20) {
                for(let j=0; j<height; j+=20) {
                    if((i+j)%40 === 0) ctx.fillRect(i, j, 4, 4);
                }
            }

            // Border
            ctx.lineWidth = 8;
            ctx.strokeStyle = "black";
            ctx.strokeRect(10, 10, width - 20, height - 20);

            // Red Pixel Corners
            ctx.fillStyle = "#ef4444"; 
            const cornerSize = 25;
            ctx.fillRect(10, 10, cornerSize, cornerSize);
            ctx.fillRect(width - 10 - cornerSize, 10, cornerSize, cornerSize);
            ctx.fillRect(10, height - 10 - cornerSize, cornerSize, cornerSize);
            ctx.fillRect(width - 10 - cornerSize, height - 10 - cornerSize, cornerSize, cornerSize);

            // Text
            ctx.textAlign = "center";
            ctx.fillStyle = "#000";
            
            ctx.font = '24px "Press Start 2P", cursive';
            ctx.fillStyle = "#db2777"; 
            ctx.fillText("VALENTINE CERTIFICATE", width/2, 60);

            ctx.font = '32px "Press Start 2P", cursive';
            ctx.fillStyle = "#000";
            ctx.fillText("Jamal & Salma", width/2, 120);

            // Draw Heart
            function drawPixelHeart(cx, cy, scale) {
                ctx.fillStyle = "#ef4444";
                const p = scale;
                const map = [
                    "01100110",
                    "11111111",
                    "11111111",
                    "11111111",
                    "01111110",
                    "00111100",
                    "00011000"
                ];
                for(let r=0; r<map.length; r++) {
                    for(let c=0; c<map[r].length; c++) {
                        if(map[r][c] === '1') {
                            ctx.fillRect(cx + (c - 4) * p, cy + (r - 3) * p, p, p);
                        }
                    }
                }
            }
            drawPixelHeart(width/2, 170, 6);

            // Memory Text
            ctx.font = '14px "Press Start 2P", cursive'; 
            ctx.fillStyle = "#374151"; 
            
            const maxLineWidth = 500;
            const lineHeight = 25;
            let x = width / 2;
            let y = 240;
            
            const words = memoryText.split(' ');
            let line = '';

            for(let n = 0; n < words.length; n++) {
                const testLine = line + words[n] + ' ';
                const metrics = ctx.measureText(testLine);
                if (metrics.width > maxLineWidth && n > 0) {
                    ctx.fillText(line, x, y);
                    line = words[n] + ' ';
                    y += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, x, y);

            // Draw Date Plan
            y += 40;
            ctx.fillStyle = "#166534"; // Dark green
            ctx.font = '12px "Press Start 2P", cursive';
            ctx.fillText(dateText, width/2, y);

            // Date Stamp
            ctx.font = '10px "Press Start 2P"';
            ctx.fillStyle = "#9ca3af";
            ctx.fillText("Official Love Contract • 2026", width/2, height - 30);

            const link = document.createElement('a');
            link.download = `Valentine_Jamal_and_Salma.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];

            function createParticle() {
                return {
                    x: Math.random() * canvas.width,
                    y: -20,
                    size: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speedY: Math.random() * 3 + 2,
                    speedX: Math.random() * 2 - 1
                };
            }

            for (let i = 0; i < 100; i++) particles.push(createParticle());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, index) => {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                    if (p.y > canvas.height) particles[index] = createParticle();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
